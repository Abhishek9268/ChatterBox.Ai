<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatterBox — Pro Portfolio Build</title>

    <!-- Robust External Scripts -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.5/babel.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/marked@12.0.0/marked.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/dompurify@3.0.10/dist/purify.min.js" crossorigin="anonymous"></script>

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap">

    <style>
        :root {
            --bg: #1a1a1a;
            --sidebar: #111111;
            --surface: #262626;
            --accent: #10a37f;
            --text: #f5f5f5;
            --text-dim: #a3a3a3;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            overflow: hidden;
        }

        .heading-font {
            font-family: 'Outfit', sans-serif;
        }

        /* Perfect Center Layout */
        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 0 1rem;
        }

        /* Smooth Responsive Sidebar */
        .sidebar {
            width: 280px;
            transition: 0.3s;
            flex-shrink: 0;
        }

        @media (max-width: 900px) {
            .sidebar {
                position: fixed;
                height: 100%;
                z-index: 100;
                left: 0;
            }

            .sidebar-closed {
                left: -280px;
            }

            .overlay {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 90;
                display: none;
            }

            .overlay-visible {
                display: block;
            }
        }

        /* Message Bubbles */
        .bubble-user {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px 18px 4px 18px;
            margin-left: auto;
            max-width: 80%;
            padding: 12px 18px;
        }

        .bubble-ai {
            flex-1 min-width: 0;
        }

        /* Floating Input with Shadow */
        .input-box {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 768px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 12px 48px -12px rgba(0, 0, 0, 0.8);
            padding: 10px 16px;
            transition: border 0.2s;
        }

        .input-box:focus-within {
            border-color: rgba(255, 255, 255, 0.2);
        }

        textarea {
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            width: 100%;
            color: #fff;
            padding: 12px;
            font-size: 16px;
            line-height: 1.4;
            max-height: 180px;
        }

        /* Custom Scrollbar */
        * {
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .prose-chat pre {
            background: #000;
            padding: 16px;
            border-radius: 12px;
            margin: 1em 0;
            overflow-x: auto;
            border: 1px solid var(--border);
        }

        .prose-chat code {
            font-family: monospace;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 4px;
            border-radius: 4px;
        }

        .prose-chat p {
            margin-bottom: 1em;
        }

        .cursor-blink::after {
            content: '▋';
            animation: blink 1s step-start infinite;
            color: var(--accent);
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <div id="root" style="width:100%; height:100%;"></div>

    <!-- Red Error Fallback (Visible only if JS fails) -->
    <div id="fatal-error"
        style="display:none; position:fixed; inset:0; background:#000; color:red; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; z-index:9999;">
        <h1 class="heading-font" style="font-size:2rem; margin-bottom:1rem;">⚠️ System Breakdown</h1>
        <p id="error-text" style="color:#666; font-family:monospace; margin-bottom:2rem;"></p>
        <button onclick="localStorage.clear(); location.reload();"
            style="border:1px solid red; padding:10px 20px; background:transparent; color:red; cursor:pointer; border-radius:50px;">Reset
            System</button>
    </div>

    <script>
        window.onerror = function (msg, url, line) {
            document.getElementById('fatal-error').style.display = 'flex';
            document.getElementById('error-text').innerText = msg + " (Line: " + line + ")";
        };
    </script>

    <script type="text/babel">
        // ────────────────────────────────────────────────────────────────
        // CORE APP COMPONENT
        // ────────────────────────────────────────────────────────────────
        const { useState, useEffect, useRef, useMemo } = React;

        // CRITICAL: HARDCODED API KEY AS REQUESTED
        const CONFIG = {
            KEY: "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",
            MODEL: "google/gemini-2.0-flash-001"
        };

        const Icon = ({ name }) => {
            const icons = {
                send: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19 0-14M5 12l7-7 7 7" /></svg>,
                plus: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14M5 12h14" /></svg>,
                menu: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12h18M3 6h18M3 18h18" /></svg>,
                trash: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /></svg>
            };
            return icons[name] || null;
        };

        const App = () => {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState("");
            const [isStreaming, setIsStreaming] = useState(false);
            const [sessions, setSessions] = useState(() => {
                try { return JSON.parse(localStorage.getItem("cb_v7_data") || "[]"); } catch (e) { return []; }
            });
            const [activeId, setActiveId] = useState("");
            const [isSidebarOpen, setSidebarOpen] = useState(window.innerWidth > 900);

            const scrollRef = useRef(null);

            useEffect(() => {
                localStorage.setItem("cb_v7_data", JSON.stringify(sessions));
            }, [sessions]);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [messages]);

            const handleSend = async (text = input) => {
                if (!text.trim() || isStreaming) return;

                const userMsg = { id: Date.now(), role: "user", content: text };
                const currentMsgs = [...messages, userMsg];
                setMessages(currentMsgs);
                setInput("");
                setIsStreaming(true);

                const aiId = Date.now() + 1;
                setMessages(prev => [...prev, { id: aiId, role: "model", content: "" }]);

                try {
                    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                        method: "POST",
                        headers: { "Authorization": `Bearer ${CONFIG.KEY}`, "Content-Type": "application/json" },
                        body: JSON.stringify({
                            model: CONFIG.MODEL,
                            messages: currentMsgs.map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.content })),
                            stream: true
                        })
                    });

                    if (!res.ok) throw new Error(`API Error ${res.status}`);

                    const reader = res.body.getReader();
                    const decoder = new TextDecoder();
                    let fullText = "";

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        const chunk = decoder.decode(value);
                        const lines = chunk.split("\n");
                        for (const line of lines) {
                            if (line.startsWith("data: ")) {
                                const data = line.slice(6);
                                if (data === "[DONE]") continue;
                                try {
                                    const delta = JSON.parse(data).choices[0].delta?.content;
                                    if (delta) {
                                        fullText += delta;
                                        setMessages(prev => prev.map(m => m.id === aiId ? { ...m, content: fullText } : m));
                                    }
                                } catch (e) { }
                            }
                        }
                    }

                    const sid = activeId || Date.now().toString();
                    setActiveId(sid);
                    setSessions(prev => {
                        const idx = prev.findIndex(s => s.id === sid);
                        if (idx !== -1) {
                            const n = [...prev]; n[idx] = { ...n[idx], messages: [...currentMsgs, { id: aiId, role: "model", content: fullText }] };
                            return n;
                        }
                        return [{ id: sid, title: text.slice(0, 36), messages: [...currentMsgs, { id: aiId, role: "model", content: fullText }] }, ...prev];
                    });

                } catch (err) {
                    setMessages(prev => prev.map(m => m.id === aiId ? { ...m, content: `⚠️ Error: ${err.message}` } : m));
                } finally {
                    setIsStreaming(false);
                }
            };

            const renderMarkdown = (content, isStream) => {
                if (!window.marked || !window.DOMPurify) return content;
                const raw = marked.parse(content || "");
                const safe = DOMPurify.sanitize(raw);
                return <div className={`prose-chat ${isStream ? 'cursor-blink' : ''}`} dangerouslySetInnerHTML={{ __html: safe }} />;
            };

            return (
                <div className="flex w-full h-full bg-[#1a1a1a]">
                    {/* Overlay for Mobile */}
                    <div className={`overlay ${isSidebarOpen && window.innerWidth < 900 ? 'overlay-visible' : ''}`} onClick={() => setSidebarOpen(false)}></div>

                    {/* Sidebar */}
                    <aside className={`sidebar bg-[#111] border-r border-white/5 flex flex-col ${!isSidebarOpen ? 'sidebar-closed' : ''}`}>
                        <div className="p-6 flex items-center justify-between">
                            <h1 className="heading-font font-black text-2xl tracking-tighter">ChatterBox<span className="text-emerald-500">.</span></h1>
                        </div>
                        <button onClick={() => { setMessages([]); setActiveId(""); }} className="mx-4 p-4 flex items-center gap-3 bg-white/5 hover:bg-white/10 rounded-2xl border border-white/5 transition-all text-sm font-semibold mb-6">
                            <Icon name="plus" /> New Chat
                        </button>
                        <div className="flex-1 overflow-y-auto px-4 space-y-2">
                            <p className="px-2 text-[10px] font-bold text-gray-700 uppercase tracking-widest mb-4">Past Sessions</p>
                            {sessions.map(s => (
                                <div key={s.id} onClick={() => { setMessages(s.messages); setActiveId(s.id); }} className={`group flex items-center gap-2 p-3 rounded-xl text-sm transition-all cursor-pointer border ${activeId === s.id ? 'bg-white/5 border-white/10 text-white' : 'border-transparent text-gray-500 hover:text-gray-300'}`}>
                                    <span className="truncate flex-1">{s.title}</span>
                                    <button onClick={(e) => { e.stopPropagation(); setSessions(prev => prev.filter(x => x.id !== s.id)); }} className="opacity-0 group-hover:opacity-100 p-1 hover:text-red-500"><Icon name="trash" /></button>
                                </div>
                            ))}
                        </div>
                        <div className="p-4 text-[9px] text-gray-800 font-bold tracking-[0.4em] text-center border-t border-white/5">PRO DEPLOYMENT V8</div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col h-full bg-[#1a1a1a] relative min-w-0">
                        <header className="h-16 flex items-center px-6 justify-between border-b border-white/5 bg-[#1a1a1a]/80 backdrop-blur-md z-40">
                            <button onClick={() => setSidebarOpen(!isSidebarOpen)} className="text-gray-400 hover:text-white transition-colors"><Icon name="menu" /></button>
                            <div className="text-[10px] font-bold text-emerald-500/50 bg-emerald-500/5 px-3 py-1 rounded-full uppercase tracking-widest">Gemini 2.0</div>
                            <div style={{ width: 24 }}></div>
                        </header>

                        <div className="flex-1 overflow-y-auto custom-scroll" ref={scrollRef}>
                            <div className="chat-container pt-12 pb-48">
                                {messages.length === 0 ? (
                                    <div className="flex flex-col items-center justify-center min-h-[60vh] text-center">
                                        <h1 className="heading-font text-5xl md:text-7xl font-black mb-6 bg-gradient-to-b from-white to-gray-500 bg-clip-text text-transparent tracking-tighter">Accelerate Thinking.</h1>
                                        <p className="text-gray-500 mb-12 text-lg md:text-xl font-medium">Portable. Private. Professional.</p>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 w-full">
                                            {["Draft a strategy", "Debug this code", "Translate to Hindi", "Write a summary"].map(t => (
                                                <button key={t} onClick={() => handleSend(t)} className="p-4 bg-white/5 border border-white/5 hover:border-white/20 rounded-2xl text-left text-sm text-gray-500 hover:text-white transition-all font-medium">
                                                    {t}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                ) : (
                                    <div className="space-y-10">
                                        {messages.map((m, idx) => (
                                            <div key={m.id} className={`flex gap-6 ${m.role === 'user' ? 'justify-end' : ''}`}>
                                                {m.role === 'model' && <div className="w-8 h-8 rounded-full bg-emerald-600 flex-shrink-0 flex items-center justify-center font-black text-[10px] shadow-lg shadow-emerald-500/20 text-white">AI</div>}
                                                <div className={`${m.role === 'user' ? 'bubble-user' : 'bubble-ai'}`}>
                                                    {renderMarkdown(m.content, isStreaming && idx === messages.length - 1 && m.role === 'model')}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Centered Floating Input */}
                        <div className="input-box">
                            <div className="flex flex-col">
                                <textarea
                                    rows="1"
                                    value={input}
                                    onChange={e => { setInput(e.target.value); e.target.style.height = 'auto'; e.target.style.height = e.target.scrollHeight + 'px'; }}
                                    onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }}
                                    placeholder="Message ChatterBox..."
                                />
                                <div className="flex justify-end p-1">
                                    <button
                                        disabled={!input.trim() || isStreaming}
                                        onClick={() => handleSend()}
                                        className="w-10 h-10 bg-white text-black rounded-2xl flex items-center justify-center hover:scale-105 active:scale-95 transition-all shadow-xl disabled:opacity-20"
                                    >
                                        {isStreaming ? <div className="w-3 h-3 bg-black animate-pulse"></div> : <Icon name="send" />}
                                    </button>
                                </div>
                            </div>
                        </div>
                        <p className="absolute bottom-4 left-0 right-0 text-center text-[9px] text-gray-800 font-bold uppercase tracking-[0.4em]">Zero-Config Deploy Build</p>
                    </main>
                </div>
            );
        };

        // Standard React 18 Rendering (No complex init logic to avoid black screens)
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
